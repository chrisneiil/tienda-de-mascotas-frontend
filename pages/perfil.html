<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Tienda de Mascotas</a>
        <a class="btn btn-light btn-sm" href="catalogo.html">Volver al catálogo</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Modificar Perfil</h2>

                    <form id="perfilForm">

                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" id="nombrePerfil" class="form-control" value="Usuario Demo" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" id="correoPerfil" class="form-control" value="usuario@demo.cl" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="telefonoPerfil" class="form-control" value="912345678" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="direccionPerfil" class="form-control" value="Santiago, Chile" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Guardar cambios</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="../js/main.js"></script>
</body>
</html>
