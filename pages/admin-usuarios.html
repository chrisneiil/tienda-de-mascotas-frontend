<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Tienda de Mascotas</a>
        <div>
            <a class="btn btn-warning btn-sm" href="admin-productos.html">Productos</a>
            <a class="btn btn-light btn-sm" href="catalogo.html">Volver</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <h1 class="text-center mb-4">Administración de Usuarios</h1>

    <div class="card shadow mb-4">
        <div class="card-body">
            <h4>Registrar / Modificar Usuario</h4>

            <form id="usuarioAdminForm">
                <div class="mb-3">
                    <label class="form-label">Nombre completo</label>
                    <input type="text" id="nombreAdminUsuario" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" id="correoAdminUsuario" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select id="rolAdminUsuario" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <option>Cliente</option>
                        <option>Administrador</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success">Guardar usuario</button>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-success">
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Usuario Demo</td>
                <td>usuario@demo.cl</td>
                <td>Cliente</td>
            </tr>
            <tr>
                <td>Administrador Demo</td>
                <td>admin@demo.cl</td>
                <td>Administrador</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
