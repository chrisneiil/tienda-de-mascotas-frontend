<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrar Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Tienda de Mascotas</a>
        <div>
            <a class="btn btn-warning btn-sm" href="admin-usuarios.html">Usuarios</a>
            <a class="btn btn-light btn-sm" href="catalogo.html">Volver</a>
        </div>
    </div>
</nav>

<main class="container my-5">
    <h1 class="text-center mb-4">Administración de Productos</h1>

    <div class="card shadow mb-4">
        <div class="card-body">
            <h4>Registrar / Modificar Producto</h4>

            <form id="productoForm">
                <div class="mb-3">
                    <label class="form-label">Nombre del producto</label>
                    <input type="text" id="nombreProducto" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoría</label>
                    <select id="categoriaProducto" class="form-select" required>
                        <option value="">Seleccione...</option>
                        <option>Alimentos</option>
                        <option>Accesorios</option>
                        <option>Juguetes</option>
                        <option>Cuidado e higiene</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number" id="precioProducto" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" id="stockProducto" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-success">Guardar producto</button>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-success">
            <tr>
                <th>Producto</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Alimento Premium Perro</td>
                <td>Alimentos</td>
                <td>$24.990</td>
                <td>15</td>
            </tr>
            <tr>
                <td>Juguete Mordedor</td>
                <td>Juguetes</td>
                <td>$5.990</td>
                <td>30</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
