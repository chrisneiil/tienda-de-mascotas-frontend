<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Tienda de Mascotas</a>
        <a class="btn btn-light btn-sm" href="catalogo.html">Volver al catálogo</a>
    </div>
</nav>

<main class="container my-5">
    <h1 class="text-center mb-4">Carrito de Compras</h1>

    <div id="carritoVacio" class="alert alert-warning text-center d-none">
        El carrito está vacío.
    </div>

    <div id="carritoContenido" class="d-none">
        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle">
                <thead class="table-success">
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody id="tablaCarrito"></tbody>
            </table>
        </div>

        <div class="card shadow mt-4">
            <div class="card-body">
                <h4 id="totalCarrito">Total: $0</h4>
                <p class="text-muted">
                    El pago será simulado, según lo solicitado por la actividad.
                </p>

                <form id="pagoForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre del titular</label>
                        <input type="text" id="titularPago" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Método de pago</label>
                        <select id="metodoPago" class="form-select" required>
                            <option value="">Seleccione...</option>
                            <option value="debito">Débito</option>
                            <option value="credito">Crédito</option>
                            <option value="transferencia">Transferencia</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success">Simular pago</button>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
