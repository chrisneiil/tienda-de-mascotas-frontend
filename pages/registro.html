<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Tienda de Mascotas</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Registro de Usuario</h2>

                    <form id="registroForm">

                        <div class="mb-3">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" id="correoRegistro" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tipo de usuario</label>
                            <select id="rol" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option value="cliente">Cliente</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" id="passwordRegistro" class="form-control" required>
                            <small class="text-muted">
                                Debe tener entre 8 y 16 caracteres, una mayúscula, un número y un carácter especial.
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirmar contraseña</label>
                            <input type="password" id="confirmarPassword" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Registrarse</button>
                        </div>

                    </form>

                    <div class="text-center mt-3">
                        <a href="login.html">Ya tengo cuenta</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="../js/main.js"></script>
</body>
</html>
