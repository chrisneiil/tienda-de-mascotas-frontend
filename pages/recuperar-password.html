<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Tienda de Mascotas</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">Recuperar Contraseña</h2>

                    <form id="recuperarForm">
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" id="correoRecuperar" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Enviar recuperación</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="login.html">Volver al inicio de sesión</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<script src="../js/main.js"></script>
</body>
</html>
